{% extends 'custom_admin/admin_base.html' %}
{% load static %}

{% block page_title %}Blog & Articles Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h5 class="fw-bold text-dark m-0">Published Articles</h5>
    <button class="btn btn-khaki fw-bold shadow-sm" onclick="openArticleModal()">
        ✍️ Write New Article
    </button>
</div>

<div class="card admin-card p-0 overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th class="ps-4">Title</th>
                    <th>Author</th>
                    <th>Published Date</th>
                    <th>Status</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
            </thead>
            <tbody id="articlesTableBody">
                <tr><td colspan="5" class="text-center py-4 text-muted">Loading articles...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="articleModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold" id="articleModalTitle">Write Article</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body bg-light p-4">
                <form id="articleForm">
                    <input type="hidden" id="articleId">
                    
                    <div class="row g-4">
                        <div class="col-lg-8">
                            <div class="card border-0 shadow-sm p-3 mb-4">
                                <label class="form-label fw-bold">Article Title</label>
                                <input type="text" id="articleTitle" class="form-control form-control-lg mb-3" required>
                                
                                <label class="form-label fw-bold">Content</label>
                                <div id="articleContentEditor" style="min-height: 400px; background: white;"></div>
                            </div>
                        </div>
                        
                        <div class="col-lg-4">
                            <div class="card border-0 shadow-sm p-3 mb-4">
                                <label class="form-label fw-bold">Cover Image (16:9 Ratio)</label>
                                <input type="file" id="articleImageInput" class="form-control mb-2" accept="image/*">
                                <input type="hidden" id="articleFinalImageUrl" required>
                                <div class="text-center mt-2">
                                    <img id="articleImagePreview" class="img-fluid rounded shadow-sm d-none" style="width: 100%; object-fit: cover; aspect-ratio: 16/9;">
                                </div>
                            </div>

                            <div class="card border-0 shadow-sm p-3">
                                <label class="form-label fw-bold">Publish Status</label>
                                <div class="form-check form-switch fs-5">
                                    <input class="form-check-input" type="checkbox" id="articleIsPublished" checked>
                                    <label class="form-check-label fs-6 mt-1 ms-2">Visible to Public</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 bg-white">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-khaki fw-bold px-4" id="saveArticleBtn">Save Article</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.ckeditor.com/ckeditor5/39.0.1/classic/ckeditor.js"></script>
<script src="{% static 'js/admin/admin_articles.js' %}"></script>
{% endblock %}
