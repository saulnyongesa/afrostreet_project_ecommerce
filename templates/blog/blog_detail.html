{% extends 'base.html' %}
{% load static %}

{% block title %}Loading Article... | Afrostreet{% endblock %}

{% block content %}
<input type="hidden" id="articleSlug" value="{{ slug }}">

<div class="row justify-content-center">
    <div class="col-lg-8 bg-white p-4 p-md-5 shadow-sm rounded" id="articleContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-khaki" role="status"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', async () => {
    const slug = document.getElementById('articleSlug').value;
    try {
        const response = await fetch(`/api/blog/articles/${slug}/`);
        const article = await response.json();
        
        document.title = `${article.title} | Afrostreet`;
        
        const container = document.getElementById('articleContainer');
        container.innerHTML = `
            <span class="badge bg-khaki mb-3">Afrostreet Editorial</span>
            <h1 class="fw-bold text-dark mb-3">${article.title}</h1>
            <div class="d-flex align-items-center text-muted small mb-4 pb-3 border-bottom">
                <span>✍️ By <strong>${article.author_name}</strong></span>
                <span class="ms-3">📅 ${new Date(article.created_at).toLocaleDateString()}</span>
            </div>
            
            <img src="/media/${article.cover_image}" class="img-fluid rounded mb-5 w-100 shadow-sm" style="max-height: 400px; object-fit: cover;">
            
            <div class="article-content text-dark" style="line-height: 1.8; font-size: 1.1rem;">
                ${article.content}
            </div>
            
            <div class="mt-5 pt-4 border-top">
                <a href="/blog/" class="btn btn-outline-dark">← Back to all articles</a>
            </div>
        `;
    } catch (error) {
        document.getElementById('articleContainer').innerHTML = '<div class="text-danger text-center">Article not found.</div>';
    }
});
</script>
{% endblock %}
