{% extends 'base.html' %}
{% load static %}

{% block title %}My Orders | Afrostreet{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h2 class="fw-bold text-dark border-bottom pb-3">📦 Order History</h2>
        <p class="text-muted">Track your recent Afrostreet purchases.</p>
    </div>
</div>

<div class="row justify-content-center" id="ordersContainer">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-khaki" role="status"></div>
        <p class="mt-2 text-muted">Loading your orders...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/my_orders.js' %}"></script>
{% endblock %}
