{% extends 'base.html' %}
{% load static %}

{% block title %}Loading Product... | Afrostreet{% endblock %}

{% block content %}
<input type="hidden" id="productSlug" value="{{ slug }}">

<div class="row bg-white p-4 p-md-5 shadow-sm rounded mb-4" id="mainProductContainer">
    <div class="col-12 text-center py-5">
        <div class="spinner-border text-khaki" role="status"></div>
        <p class="mt-2 text-muted">Loading product details...</p>
    </div>
</div>

<div class="row bg-white p-4 shadow-sm rounded mb-4 d-none" id="productDescriptionSection">
    <h4 class="border-bottom pb-2 fw-bold">Product Details</h4>
    <div id="productDescriptionContent" class="mt-3 text-muted" style="line-height: 1.8;">
    </div>
</div>

<section class="mt-5 bg-white p-4 shadow-sm rounded">
    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
        <h4 class="fw-bold text-dark m-0">🛍️ More Products You'll Love</h4>
    </div>
    <div class="row g-3" id="relatedProductsContainer">
        <div class="col-12 text-center text-muted py-4">Loading recommendations...</div>
    </div>
</section>

<div class="modal fade" id="imageZoomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-fullscreen-md-down">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-header border-0 pb-0 z-3">
                <button type="button" class="btn-close btn-close-dark bg-light p-2 rounded-circle ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center pt-0 d-flex justify-content-center align-items-center">
                <img id="zoomedImage" src="" class="img-fluid rounded shadow-lg bg-white" alt="Zoomed Product" style="max-height: 90vh; object-fit: contain;">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/pages/product_detail.js' %}"></script>
{% endblock %}
